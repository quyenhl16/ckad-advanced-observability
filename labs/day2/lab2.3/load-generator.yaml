apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-load-generator
  namespace: ckad-labs
  labels:
    app: hpa-load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-load-generator
  template:
    metadata:
      labels:
        app: hpa-load-generator
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532}
      initContainers:
        - name: config-init
          image: busybox:1.37
          command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s#http://127.0.0.1:APP_PORT#http://traffic-hpa:8080#g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log /logs/load.log']
          resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
          volumeMounts:
            - {name: proxy-template, mountPath: /templates, readOnly: true}
            - {name: generated-config, mountPath: /generated}
            - {name: shared-logs, mountPath: /logs}
      containers:
        - name: app
          image: busybox:1.37
          command: [sh, -c]
          args:
            - |
              until wget -qO- http://127.0.0.1:8080/health/live >/dev/null; do sleep 1; done
              workers="${WORKERS:-16}"
              echo "starting ${workers} load workers" >> /logs/load.log
              for worker in $(seq 1 "$workers"); do
                while true; do
                  wget -qO- http://127.0.0.1:8080/health/live >/dev/null || true
                done &
              done
              wait
          env:
            - {name: WORKERS, value: "16"}
          resources: {requests: {cpu: 10m, memory: 8Mi}, limits: {cpu: 100m, memory: 32Mi}}
          volumeMounts: [{name: shared-logs, mountPath: /logs}]
        - name: log-sidecar
          image: busybox:1.37
          command: [sh, -c, 'tail -n+1 -F /logs/load.log /logs/access.log']
          resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
          volumeMounts: [{name: shared-logs, mountPath: /logs, readOnly: true}]
        - name: nginx-ambassador
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
          ports: [{name: http, containerPort: 8080}]
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
          volumeMounts:
            - {name: generated-config, mountPath: /config, readOnly: true}
            - {name: shared-logs, mountPath: /var/log/shared}
            - {name: nginx-tmp, mountPath: /tmp}
      volumes:
        - name: proxy-template
          configMap: {name: pod-pattern-config, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
        - {name: generated-config, emptyDir: {}}
        - {name: shared-logs, emptyDir: {}}
        - {name: nginx-tmp, emptyDir: {}}
