apiVersion: v1
kind: Pod
metadata:
  name: rbac-api-client
  namespace: ckad-labs
  labels: {app: rbac-api-client, lab: "3.3"}
spec:
  serviceAccountName: pod-reader
  automountServiceAccountToken: true
  restartPolicy: Never
  securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532}
  initContainers:
    - name: config-init
      image: busybox:1.37
      command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s/APP_PORT/18080/g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log']
      resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
      volumeMounts:
        - {name: proxy-template, mountPath: /templates, readOnly: true}
        - {name: generated-config, mountPath: /generated}
        - {name: shared-logs, mountPath: /logs}
  containers:
    - name: app
      image: python:3.13-alpine
      command: [python, -u, -c]
      args:
        - |
          import functools
          import http.server
          import os
          import ssl
          import threading
          import time
          import urllib.request

          service_account_dir = "/var/run/secrets/kubernetes.io/serviceaccount"
          token_file = f"{service_account_dir}/token"
          ca_file = f"{service_account_dir}/ca.crt"
          with open(f"{service_account_dir}/namespace", encoding="utf-8") as stream:
              namespace = stream.read().strip()

          api_host = os.environ["KUBERNETES_SERVICE_HOST"]
          if ":" in api_host and not api_host.startswith("["):
              api_host = f"[{api_host}]"
          api_port = os.environ.get("KUBERNETES_SERVICE_PORT_HTTPS", "443")
          api_url = f"https://{api_host}:{api_port}/api/v1/namespaces/{namespace}/pods"
          tls_context = ssl.create_default_context(cafile=ca_file)

          def refresh_pod_list():
              while True:
                  try:
                      with open(token_file, encoding="utf-8") as stream:
                          token = stream.read().strip()
                      request = urllib.request.Request(
                          api_url,
                          headers={"Authorization": f"Bearer {token}"},
                      )
                      with urllib.request.urlopen(
                          request,
                          context=tls_context,
                          timeout=10,
                      ) as response:
                          payload = response.read()
                      temporary_file = "/www/pods.json.tmp"
                      with open(temporary_file, "wb") as stream:
                          stream.write(payload)
                      os.replace(temporary_file, "/www/pods.json")
                      print(f"refreshed PodList ({len(payload)} bytes)", flush=True)
                  except Exception as error:
                      print(f"failed to refresh PodList: {error}", flush=True)
                  time.sleep(15)

          threading.Thread(target=refresh_pod_list, daemon=True).start()
          handler = functools.partial(
              http.server.SimpleHTTPRequestHandler,
              directory="/www",
          )
          server = http.server.ThreadingHTTPServer(("0.0.0.0", 18080), handler)
          server.serve_forever()
      ports: [{name: app-http, containerPort: 18080}]
      securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
      volumeMounts: [{name: web-content, mountPath: /www}]
    - name: log-sidecar
      image: busybox:1.37
      command: [sh, -c, 'tail -n+1 -F /logs/access.log']
      resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
      volumeMounts: [{name: shared-logs, mountPath: /logs, readOnly: true}]
    - name: nginx-ambassador
      image: nginxinc/nginx-unprivileged:1.27-alpine
      command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
      ports: [{name: http, containerPort: 8080}]
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
      volumeMounts:
        - {name: generated-config, mountPath: /config, readOnly: true}
        - {name: shared-logs, mountPath: /var/log/shared}
        - {name: nginx-tmp, mountPath: /tmp}
  volumes:
    - name: proxy-template
      configMap: {name: pod-pattern-config, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
    - {name: generated-config, emptyDir: {}}
    - {name: shared-logs, emptyDir: {}}
    - {name: web-content, emptyDir: {}}
    - {name: nginx-tmp, emptyDir: {}}
