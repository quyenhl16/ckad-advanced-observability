apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader
  namespace: ckad-labs
  labels: {lab: "3.3"}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: ckad-labs
  labels: {lab: "3.3"}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader
  namespace: ckad-labs
  labels: {lab: "3.3"}
subjects:
  - kind: ServiceAccount
    name: pod-reader
    namespace: ckad-labs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
