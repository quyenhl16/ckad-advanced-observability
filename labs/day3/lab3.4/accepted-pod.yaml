apiVersion: v1
kind: Pod
metadata:
  name: quota-accepted
  namespace: ckad-quota-lab
  labels: {app: quota-accepted, lab: "3.4"}
spec:
  restartPolicy: Never
  securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532}
  initContainers:
    - name: config-init
      image: busybox:1.37
      command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s/APP_PORT/18080/g" /templates/nginx.conf.template > /generated/nginx.conf && echo quota-accepted > /www/index.html && touch /logs/access.log']
      volumeMounts:
        - {name: proxy-template, mountPath: /templates, readOnly: true}
        - {name: generated-config, mountPath: /generated}
        - {name: shared-logs, mountPath: /logs}
        - {name: web-content, mountPath: /www}
  containers:
    - name: app
      image: busybox:1.37
      command: [httpd, -f, -p, "18080", -h, /www]
      ports: [{name: app-http, containerPort: 18080}]
      volumeMounts: [{name: web-content, mountPath: /www, readOnly: true}]
    - name: log-sidecar
      image: busybox:1.37
      command: [sh, -c, 'tail -n+1 -F /logs/access.log']
      volumeMounts: [{name: shared-logs, mountPath: /logs, readOnly: true}]
    - name: nginx-ambassador
      image: nginxinc/nginx-unprivileged:1.27-alpine
      command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
      ports: [{name: http, containerPort: 8080}]
      volumeMounts:
        - {name: generated-config, mountPath: /config, readOnly: true}
        - {name: shared-logs, mountPath: /var/log/shared}
        - {name: nginx-tmp, mountPath: /tmp}
  volumes:
    - name: proxy-template
      configMap: {name: pod-pattern-config, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
    - {name: generated-config, emptyDir: {}}
    - {name: shared-logs, emptyDir: {}}
    - {name: web-content, emptyDir: {}}
    - {name: nginx-tmp, emptyDir: {}}
