apiVersion: v1
kind: Namespace
metadata:
  name: ckad-quota-lab
  labels: {app.kubernetes.io/part-of: ckad-labs, lab: "3.4"}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-pattern-config
  namespace: ckad-quota-lab
data:
  nginx.conf.template: |
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;
    events {}
    http {
      access_log /var/log/shared/access.log;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen PUBLIC_PORT;
        location / {
          proxy_pass http://127.0.0.1:APP_PORT;
        }
      }
    }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: container-defaults
  namespace: ckad-quota-lab
  labels: {lab: "3.4"}
spec:
  limits:
    - type: Container
      defaultRequest: {cpu: 50m, memory: 32Mi}
      default: {cpu: 100m, memory: 64Mi}
      min: {cpu: 5m, memory: 4Mi}
      max: {cpu: 750m, memory: 256Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: ckad-quota-lab
  labels: {lab: "3.4"}
spec:
  hard:
    pods: "2"
    requests.cpu: 500m
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
