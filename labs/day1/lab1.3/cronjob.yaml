apiVersion: batch/v1
kind: CronJob
metadata:
  name: metric-every-minute
  namespace: ckad-labs
  labels:
    app: metric-generator
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: metric-generator
            workload: cronjob
        spec:
          restartPolicy: Never
          securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532}
          initContainers:
            - name: config-init
              image: busybox:1.37
              command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s#http://127.0.0.1:APP_PORT#http://traffic-ingest.advanced-observability.svc.cluster.local:8080#g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log']
              volumeMounts:
                - {name: proxy-template, mountPath: /templates, readOnly: true}
                - {name: generated-config, mountPath: /generated}
                - {name: shared-logs, mountPath: /logs}
          containers:
            - name: submit
              image: curlimages/curl:8.10.1
              command: [sh, -c]
              args:
                - |
                  trap 'touch /lifecycle/done' EXIT
                  attempts=0
                  until curl -fsS http://127.0.0.1:8080/health/live >/dev/null; do
                    attempts=$((attempts + 1))
                    [ "$attempts" -ge 30 ] && exit 1
                    sleep 1
                  done
                  curl -fsS -X POST http://127.0.0.1:8080/api/v1/metrics \
                    -H "Content-Type: application/json" \
                    -d '{"device_type":"server","device_id":"cron-01","cpu_usage_percent":40,"memory_usage_percent":55,"temperature_celsius":48,"latency_ms":180,"packet_loss_percent":0.5}'
              resources:
                requests: {cpu: 10m, memory: 16Mi}
                limits: {cpu: 100m, memory: 64Mi}
              volumeMounts: [{name: lifecycle, mountPath: /lifecycle}]
            - name: log-sidecar
              image: busybox:1.37
              command: [sh, -c, 'tail -n+1 -F /logs/access.log & pid=$!; until [ -f /lifecycle/done ]; do sleep 1; done; kill $pid; wait $pid || true']
              resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
              volumeMounts:
                - {name: shared-logs, mountPath: /logs, readOnly: true}
                - {name: lifecycle, mountPath: /lifecycle, readOnly: true}
            - name: nginx-ambassador
              image: nginxinc/nginx-unprivileged:1.27-alpine
              command: [sh, -c, 'nginx -g "daemon off;" -c /config/nginx.conf & pid=$!; until [ -f /lifecycle/done ]; do sleep 1; done; nginx -s quit -c /config/nginx.conf; wait $pid']
              ports: [{name: http, containerPort: 8080}]
              resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
              volumeMounts:
                - {name: generated-config, mountPath: /config, readOnly: true}
                - {name: shared-logs, mountPath: /var/log/shared}
                - {name: lifecycle, mountPath: /lifecycle, readOnly: true}
                - {name: nginx-tmp, mountPath: /tmp}
          volumes:
            - name: proxy-template
              configMap: {name: pod-pattern-config, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
            - {name: generated-config, emptyDir: {}}
            - {name: shared-logs, emptyDir: {}}
            - {name: lifecycle, emptyDir: {}}
            - {name: nginx-tmp, emptyDir: {}}
