apiVersion: batch/v1
kind: Job
metadata:
  name: metric-once
  namespace: ckad-labs
  labels:
    app: metric-generator
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: metric-generator
        workload: job
    spec:
      restartPolicy: Never
      containers:
        - name: submit
          image: curlimages/curl:8.10.1
          args:
            - -fsS
            - -X
            - POST
            - http://traffic-ingest.advanced-observability.svc.cluster.local:8080/api/v1/metrics
            - -H
            - "Content-Type: application/json"
            - -d
            - '{"device_type":"router","device_id":"job-01","cpu_usage_percent":50,"memory_usage_percent":60,"temperature_celsius":45,"latency_ms":220,"packet_loss_percent":1}'
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
