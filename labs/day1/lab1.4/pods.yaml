apiVersion: v1
kind: List
items:
  - &label-pod
    apiVersion: v1
    kind: Pod
    metadata: {name: label-client-1, namespace: ckad-labs, labels: {app: label-client, environment: test, index: "1"}}
    spec:
      restartPolicy: Never
      securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532}
      initContainers:
        - name: config-init
          image: busybox:1.37
          command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s/APP_PORT/18080/g" /templates/nginx.conf.template > /generated/nginx.conf && echo ready > /www/index.html && touch /logs/access.log']
          volumeMounts:
            - {name: proxy-template, mountPath: /templates, readOnly: true}
            - {name: generated-config, mountPath: /generated}
            - {name: shared-logs, mountPath: /logs}
            - {name: web-content, mountPath: /www}
      containers:
        - name: app
          image: busybox:1.37
          command: [httpd, -f, -p, "18080", -h, /www]
          resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
          volumeMounts: [{name: web-content, mountPath: /www, readOnly: true}]
        - name: log-sidecar
          image: busybox:1.37
          command: [sh, -c, 'tail -n+1 -F /logs/access.log']
          resources: {requests: {cpu: 5m, memory: 4Mi}, limits: {cpu: 25m, memory: 16Mi}}
          volumeMounts: [{name: shared-logs, mountPath: /logs, readOnly: true}]
        - name: nginx-ambassador
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
          ports: [{name: http, containerPort: 8080}]
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
          volumeMounts:
            - {name: generated-config, mountPath: /config, readOnly: true}
            - {name: shared-logs, mountPath: /var/log/shared}
            - {name: nginx-tmp, mountPath: /tmp}
      volumes:
        - name: proxy-template
          configMap: {name: pod-pattern-config, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
        - {name: generated-config, emptyDir: {}}
        - {name: shared-logs, emptyDir: {}}
        - {name: web-content, emptyDir: {}}
        - {name: nginx-tmp, emptyDir: {}}
  - <<: *label-pod
    metadata: {name: label-client-2, namespace: ckad-labs, labels: {app: label-client, environment: test, index: "2"}}
  - <<: *label-pod
    metadata: {name: label-client-3, namespace: ckad-labs, labels: {app: label-client, environment: test, index: "3"}}
  - <<: *label-pod
    metadata: {name: label-client-4, namespace: ckad-labs, labels: {app: label-client, environment: test, index: "4"}}
  - <<: *label-pod
    metadata: {name: label-client-5, namespace: ckad-labs, labels: {app: label-client, environment: test, index: "5"}}
