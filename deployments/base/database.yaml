apiVersion: v1
kind: Service
metadata:
  name: observability-db
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: observability-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: advanced-observability
spec:
  clusterIP: None
  selector:
    app: observability-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: observability-db
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: observability-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: advanced-observability
spec:
  serviceName: observability-db
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: observability-db
  template:
    metadata:
      labels:
        app: observability-db
        app.kubernetes.io/name: observability-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: advanced-observability
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_USER}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_PASSWORD}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_DB}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          readinessProbe:
            exec:
              command: [sh, -c, 'pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [sh, -c, 'pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: database-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: database-data
        labels:
          app.kubernetes.io/name: observability-db
          app.kubernetes.io/part-of: advanced-observability
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
