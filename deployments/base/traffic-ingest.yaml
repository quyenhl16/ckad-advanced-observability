apiVersion: v1
kind: Service
metadata:
  name: traffic-ingest
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: traffic-ingest
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: advanced-observability
spec:
  type: NodePort
  selector: {app: traffic-ingest}
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-ingest
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: traffic-ingest
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: advanced-observability
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {app: traffic-ingest}
  template:
    metadata:
      labels:
        app: traffic-ingest
        app.kubernetes.io/name: traffic-ingest
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: advanced-observability
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-init
          image: busybox:1.37
          command: [sh, -c, 'sed "s/PUBLIC_PORT/8080/g; s/APP_PORT/18080/g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: 5m, memory: 4Mi}
            limits: {cpu: 25m, memory: 16Mi}
          volumeMounts:
            - {name: proxy-template, mountPath: /templates, readOnly: true}
            - {name: generated-config, mountPath: /generated}
            - {name: shared-logs, mountPath: /logs}
      containers:
        - name: app
          image: ckad/traffic-ingest:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: app-http
              containerPort: 18080
          envFrom:
            - configMapRef: {name: observability-config}
          env:
            - {name: HTTP_ADDR, value: ":18080"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          readinessProbe:
            httpGet: {path: /health/ready, port: app-http}
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /health/live, port: app-http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: {path: /health/live, port: app-http}
            periodSeconds: 2
            failureThreshold: 15
        - name: log-sidecar
          image: busybox:1.37
          command: [sh, -c, 'tail -n+1 -F /logs/access.log']
          resources:
            requests: {cpu: 5m, memory: 4Mi}
            limits: {cpu: 25m, memory: 16Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: shared-logs, mountPath: /logs, readOnly: true}
        - name: nginx-ambassador
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
          ports:
            - {name: http, containerPort: 8080}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: generated-config, mountPath: /config, readOnly: true}
            - {name: shared-logs, mountPath: /var/log/shared}
            - {name: nginx-tmp, mountPath: /tmp}
      volumes:
        - name: proxy-template
          configMap: {name: nginx-proxy-template, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
        - {name: generated-config, emptyDir: {}}
        - {name: shared-logs, emptyDir: {}}
        - {name: nginx-tmp, emptyDir: {}}
