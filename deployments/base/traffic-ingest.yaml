apiVersion: v1
kind: Service
metadata:
  name: traffic-ingest
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: traffic-ingest
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: advanced-observability
spec:
  type: NodePort
  selector: {app: traffic-ingest}
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-ingest
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: traffic-ingest
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: advanced-observability
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {app: traffic-ingest}
  template:
    metadata:
      labels:
        app: traffic-ingest
        app.kubernetes.io/name: traffic-ingest
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: advanced-observability
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ckad/traffic-ingest:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef: {name: observability-config}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: {path: /health/live, port: http}
            periodSeconds: 2
            failureThreshold: 15
