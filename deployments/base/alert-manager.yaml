apiVersion: v1
kind: Service
metadata:
  name: alert-manager
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: alert-manager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: advanced-observability
spec:
  selector: {app: alert-manager}
  ports:
    - name: http
      port: 8082
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-manager
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: alert-manager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: advanced-observability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels: {app: alert-manager}
  template:
    metadata:
      labels:
        app: alert-manager
        app.kubernetes.io/name: alert-manager
        app.kubernetes.io/component: alerting
        app.kubernetes.io/part-of: advanced-observability
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-init
          image: postgres:17-alpine
          command: [sh, -c, 'sed "s/PUBLIC_PORT/8082/g; s/APP_PORT/18082/g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log && until pg_isready -h observability-db -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done']
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_USER}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_DB}
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 50m, memory: 64Mi}
          volumeMounts:
            - {name: proxy-template, mountPath: /templates, readOnly: true}
            - {name: generated-config, mountPath: /generated}
            - {name: shared-logs, mountPath: /logs}
      containers:
        - name: app
          image: ckad/alert-manager:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: app-http
              containerPort: 18082
          env:
            - name: HTTP_ADDR
              value: :18082
            - name: ALERT_API_KEY
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: ALERT_API_KEY}
            - name: ALERT_NOTIFIER
              valueFrom:
                configMapKeyRef: {name: observability-config, key: ALERT_NOTIFIER}
            - name: ALERT_REPOSITORY
              valueFrom:
                configMapKeyRef: {name: observability-config, key: ALERT_REPOSITORY}
            - name: SMTP_ADDRESS
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: SMTP_ADDRESS}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: SMTP_HOST}
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: SMTP_USERNAME}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: SMTP_PASSWORD}
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: SMTP_FROM}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_USER}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_PASSWORD}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: POSTGRES_DB}
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@observability-db:5432/$(POSTGRES_DB)?sslmode=disable
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          readinessProbe:
            httpGet: {path: /health/ready, port: app-http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /health/live, port: app-http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          startupProbe:
            httpGet: {path: /health/live, port: app-http}
            periodSeconds: 2
            failureThreshold: 20
        - name: log-sidecar
          image: busybox:1.37
          command: [sh, -c, 'tail -n+1 -F /logs/access.log']
          resources:
            requests: {cpu: 5m, memory: 4Mi}
            limits: {cpu: 25m, memory: 16Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: shared-logs, mountPath: /logs, readOnly: true}
        - name: nginx-ambassador
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
          ports:
            - {name: http, containerPort: 8082}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: generated-config, mountPath: /config, readOnly: true}
            - {name: shared-logs, mountPath: /var/log/shared}
            - {name: nginx-tmp, mountPath: /tmp}
      volumes:
        - name: proxy-template
          configMap: {name: nginx-proxy-template, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
        - {name: generated-config, emptyDir: {}}
        - {name: shared-logs, emptyDir: {}}
        - {name: nginx-tmp, emptyDir: {}}
