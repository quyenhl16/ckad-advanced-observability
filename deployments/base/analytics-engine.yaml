apiVersion: v1
kind: Service
metadata:
  name: analytics-engine
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: analytics-engine
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: advanced-observability
spec:
  selector: {app: analytics-engine}
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-engine
  namespace: advanced-observability
  labels:
    app.kubernetes.io/name: analytics-engine
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: advanced-observability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels: {app: analytics-engine}
  template:
    metadata:
      labels:
        app: analytics-engine
        app.kubernetes.io/name: analytics-engine
        app.kubernetes.io/component: analytics
        app.kubernetes.io/part-of: advanced-observability
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-init
          image: busybox:1.37
          command: [sh, -c, 'sed "s/PUBLIC_PORT/8081/g; s/APP_PORT/18081/g" /templates/nginx.conf.template > /generated/nginx.conf && touch /logs/access.log /events/events.jsonl']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: 5m, memory: 4Mi}
            limits: {cpu: 25m, memory: 16Mi}
          volumeMounts:
            - {name: proxy-template, mountPath: /templates, readOnly: true}
            - {name: generated-config, mountPath: /generated}
            - {name: shared-logs, mountPath: /logs}
            - {name: analytics-logs, mountPath: /events}
      containers:
        - name: app
          image: ckad/analytics-engine:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: app-http
              containerPort: 18081
          envFrom:
            - configMapRef: {name: observability-config}
          env:
            - name: HTTP_ADDR
              value: :18081
            - name: ANALYTICS_LOG_PATH
              value: /var/log/analytics/events.jsonl
            - name: ALERT_API_KEY
              valueFrom:
                secretKeyRef: {name: observability-secrets, key: ALERT_API_KEY}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          readinessProbe:
            httpGet: {path: /health/ready, port: app-http}
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet: {path: /health/live, port: app-http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          startupProbe:
            httpGet: {path: /health/live, port: app-http}
            periodSeconds: 2
            failureThreshold: 15
          volumeMounts:
            - name: analytics-logs
              mountPath: /var/log/analytics
        - name: log-sidecar
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command: [sh, -c, "tail -n+1 -F /logs/access.log /events/events.jsonl"]
          resources:
            requests: {cpu: 10m, memory: 8Mi}
            limits: {cpu: 50m, memory: 32Mi}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - {name: shared-logs, mountPath: /logs, readOnly: true}
            - {name: analytics-logs, mountPath: /events, readOnly: true}
        - name: nginx-ambassador
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command: [nginx, -g, "daemon off;", -c, /config/nginx.conf]
          ports:
            - {name: http, containerPort: 8081}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: generated-config, mountPath: /config, readOnly: true}
            - {name: shared-logs, mountPath: /var/log/shared}
            - {name: nginx-tmp, mountPath: /tmp}
      volumes:
        - name: analytics-logs
          emptyDir: {}
        - name: proxy-template
          configMap: {name: nginx-proxy-template, items: [{key: nginx.conf.template, path: nginx.conf.template}]}
        - {name: generated-config, emptyDir: {}}
        - {name: shared-logs, emptyDir: {}}
        - {name: nginx-tmp, emptyDir: {}}
